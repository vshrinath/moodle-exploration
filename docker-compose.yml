services:
  mariadb:
    image: docker.io/bitnamilegacy/mariadb:latest
    volumes:
      - 'mariadb_data:/bitnami/mariadb'
    environment:
      - MARIADB_USER=${MARIADB_USER:-bn_moodle}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-bitnami_moodle}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
  moodle:
    image: docker.io/bitnamilegacy/moodle:5.0.2
    ports:
      - '8080:8080'
      - '8443:8443'
    volumes:
      - 'moodle_data:/bitnami/moodle'
      - 'moodledata_data:/bitnami/moodledata'
    depends_on:
      - mariadb
    environment:
      - BITNAMI_DEBUG=${BITNAMI_DEBUG:-false}
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=${MARIADB_USER:-bn_moodle}
      - MOODLE_DATABASE_NAME=${MARIADB_DATABASE:-bitnami_moodle}
      - MOODLE_DATABASE_PASSWORD=${MARIADB_PASSWORD}
volumes:
  mariadb_data:
    driver: local
  moodle_data:
    driver: local
  moodledata_data:
    driver: local
