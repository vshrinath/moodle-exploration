name: moodlehq-dev

services:
  mysql:
    image: docker.io/mysql:8.4
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MOODLEHQ_DB_NAME:-moodle}
      - MYSQL_USER=${MOODLEHQ_DB_USER:-moodle}
      - MYSQL_PASSWORD=${MOODLEHQ_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MOODLEHQ_DB_ROOT_PASSWORD}
    volumes:
      - moodlehq_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  moodle:
    image: docker.io/moodlehq/moodle-php-apache:8.2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '${MOODLEHQ_WEB_PORT:-8081}:80'
    environment:
      - SCEH_DB_HOST=mysql
      - SCEH_DB_PORT=3306
      - SCEH_DB_NAME=${MOODLEHQ_DB_NAME:-moodle}
      - SCEH_DB_USER=${MOODLEHQ_DB_USER:-moodle}
      - SCEH_DB_PASSWORD=${MOODLEHQ_DB_PASSWORD}
      - SCEH_WWWROOT=${MOODLEHQ_WWWROOT:-http://127.0.0.1:8081}
      - SCEH_DATAROOT=/var/www/moodledata
      - SCEH_ADMIN_USER=${MOODLEHQ_ADMIN_USER:-admin}
      - SCEH_ADMIN_PASS=${MOODLEHQ_ADMIN_PASS}
      - SCEH_ADMIN_EMAIL=${MOODLEHQ_ADMIN_EMAIL:-admin@example.com}
      - SCEH_FULLNAME=${MOODLEHQ_SITE_FULLNAME:-SCEH}
      - SCEH_SHORTNAME=${MOODLEHQ_SITE_SHORTNAME:-SCEH}
      - PHP_INI-memory_limit=1024M
      - PHP_INI-upload_max_filesize=256M
      - PHP_INI-post_max_size=256M
    volumes:
      - ./moodle-core:/var/www/html
      - ./block_sceh_dashboard:/var/www/html/public/blocks/sceh_dashboard
      - ./local_sceh_rules:/var/www/html/public/local/sceh_rules
      - ./local_sceh_importer:/var/www/html/public/local/sceh_importer
      - ./local_kirkpatrick_dashboard:/var/www/html/public/local/kirkpatrick_dashboard
      - ./local_kirkpatrick_level4:/var/www/html/public/local/kirkpatrick_level4
      - ./theme_sceh:/var/www/html/public/theme/sceh
      - ./mod/attendance:/var/www/html/public/mod/attendance
      - ./scripts:/var/www/html/public/scripts
      - ./scripts/moodlehq/start-web.sh:/opt/sceh/start-web.sh:ro
      - ./scripts/moodlehq/entrypoint.d:/docker-entrypoint.d:ro
      - moodlehq_moodledata:/var/www/moodledata
    command: ["/bin/bash", "-lc", "/opt/sceh/start-web.sh"]

  moodle_cron:
    image: docker.io/moodlehq/moodle-php-apache:8.2
    restart: unless-stopped
    depends_on:
      - moodle
    environment:
      - SCEH_CRON_INTERVAL=${MOODLEHQ_CRON_INTERVAL:-60}
    volumes:
      - ./moodle-core:/var/www/html
      - ./block_sceh_dashboard:/var/www/html/public/blocks/sceh_dashboard
      - ./local_sceh_rules:/var/www/html/public/local/sceh_rules
      - ./local_sceh_importer:/var/www/html/public/local/sceh_importer
      - ./local_kirkpatrick_dashboard:/var/www/html/public/local/kirkpatrick_dashboard
      - ./local_kirkpatrick_level4:/var/www/html/public/local/kirkpatrick_level4
      - ./theme_sceh:/var/www/html/public/theme/sceh
      - ./mod/attendance:/var/www/html/public/mod/attendance
      - ./scripts/moodlehq/start-cron.sh:/opt/sceh/start-cron.sh:ro
      - ./scripts/moodlehq/entrypoint.d:/docker-entrypoint.d:ro
    command: ["/bin/bash", "-lc", "/opt/sceh/start-cron.sh"]

volumes:
  moodlehq_mysql_data:
    driver: local
  moodlehq_moodledata:
    driver: local
