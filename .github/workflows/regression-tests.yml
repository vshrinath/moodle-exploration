name: Regression Tests

on:
  push:
    branches: [ master, main, develop, front-end-explorations ]
  pull_request:
    branches: [ master, main, develop, front-end-explorations ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Moodle Core
        run: |
          chmod +x scripts/moodlehq/bootstrap-core.sh
          ./scripts/moodlehq/bootstrap-core.sh

      - name: Setup environment
        run: |
          cp .env.example .env
          echo "MOODLEHQ_ADMIN_PASS=Moodle123!" >> .env
          echo "MOODLEHQ_DB_ROOT_PASSWORD=rootpass" >> .env
          echo "MOODLEHQ_DB_PASSWORD=moodlepass" >> .env

      - name: Fix permissions for CI
        run: |
          mkdir -p moodle-core/public
          sudo chown -R 1001:1001 .

      - name: Start Docker Compose
        run: |
          docker compose -f docker-compose.moodlehq.yml up -d
          # Wait for Moodle to be ready by checking logs for the startup message
          max_attempts=60
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if docker compose -f docker-compose.moodlehq.yml logs moodle | grep -q "Apache started"; then
              echo "Moodle is ready."
              break
            fi
            echo "Waiting for Moodle setup... (Attempt $attempt/$max_attempts)"
            sleep 10
            attempt=$((attempt+1))
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "Moodle failed to start in time."
            docker compose -f docker-compose.moodlehq.yml logs
            exit 1
          fi

      - name: Run Plugin Symlink Fix
        run: |
          docker exec moodlehq-dev-moodle-1 mkdir -p /var/www/html/local
          docker exec moodlehq-dev-moodle-1 mkdir -p /var/www/html/blocks
          docker exec moodlehq-dev-moodle-1 mkdir -p /var/www/html/theme
          docker exec moodlehq-dev-moodle-1 mkdir -p /var/www/html/mod
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/local/sceh_importer /var/www/html/local/sceh_importer
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/local/sceh_rules /var/www/html/local/sceh_rules
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/local/kirkpatrick_dashboard /var/www/html/local/kirkpatrick_dashboard
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/local/kirkpatrick_level4 /var/www/html/local/kirkpatrick_level4
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/blocks/sceh_dashboard /var/www/html/blocks/sceh_dashboard
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/theme/sceh /var/www/html/theme/sceh
          docker exec moodlehq-dev-moodle-1 ln -sf /var/www/html/public/mod/attendance /var/www/html/mod/attendance

      - name: Provision Plugins
        run: |
          docker exec moodlehq-dev-moodle-1 php /var/www/html/public/scripts/config/configure_kirkpatrick_plugins.php
          docker exec moodlehq-dev-moodle-1 php /var/www/html/public/scripts/config/configure_attendance_tracking.php

      - name: Run All Regression Tests
        run: |
          docker exec moodlehq-dev-moodle-1 php /var/www/html/public/scripts/test/run_all_tests.php

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose -f docker-compose.moodlehq.yml down
